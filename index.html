<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โต๊ะเถ้าธุลี (The Ashen Table) — Rogue-lite PvE &amp; PvP Permadeath Arena</title>
  <link rel="stylesheet" href="css/style.css?v=17.3" />
  <link rel="stylesheet" href="css/animations.css?v=17.3" /><!-- v7: combat cue library -->
  <link rel="stylesheet" href="css/scene3d.css?v=17.3" /><!-- v13: three.js 2.5D layer -->
  <!-- v15: import map — lets ES modules resolve bare "three" and the addon
       loaders (GLTFLoader/SkeletonUtils) straight from the CDN, which is what
       makes real glTF character models possible with zero build step. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

</head>
<body>

  <!-- v13: real-WebGL 2.5D sky (js/scene3d.js). Hidden until its first
       frame succeeds; the CSS parallax below stays as the guaranteed
       fallback for devices without WebGL or with the 3D layer disabled. -->
  <canvas id="scene3d-canvas" aria-hidden="true"></canvas>

  <!-- 2.5D parallax background (CSS fallback): each layer moves at a
       different speed based on its data-depth, driven by js/parallax.js -->
  <div class="parallax-scene" aria-hidden="true">
    <div class="parallax-layer layer-sky" data-depth="0.04" data-drift="true"></div>
    <div class="parallax-layer layer-moon" data-depth="0.08"></div>
    <div class="parallax-layer layer-mountains-far" data-depth="0.15"></div>
    <div class="parallax-layer layer-mountains-near" data-depth="0.3"></div>
    <div class="parallax-layer layer-mist" data-depth="0.45" data-drift="true"></div>
  </div>

  <!-- Game mounts here; main.js shows the auth gate first, then hands off
       to gameController.js which owns everything inside #app after that -->
  <div id="app"></div>

  <script type="module" src="js/main.js?v=17.3"></script>
</body>
</html>
